# Real RangeNet++ inference bridge.
#
# This node does not implement neural inference by itself. It loads a Python
# backend module that wraps your RangeNet++ runtime/model and converts its output
# into the PointCloud2 format used by semantic_voxel_mapper_node.
#
# Backend interface:
#   class RangeNetPPBackend:
#     def __init__(self, model_dir, model_config, model_weights, device, **kwargs): ...
#     def infer(self, points_xyzi): ...
#
# infer(points_xyzi) receives an Nx4 float32 numpy array: x y z intensity.
# It must return one of:
#   labels
#   (labels, confidence)
#   {"labels": labels, "confidence": confidence}

input_cloud_topic: /livox/mid360/points_xyzirt
output_cloud_topic: /rangenet/semantic_points

# Set this to the directory containing your backend wrapper .py file.
# Example: /home/dawn/software/rangenetpp_ros_backend
backend_python_path: /home/dawn/software/rangenetpp_ros_backend
backend_module: rangenetpp_backend
backend_class: RangeNetPPBackend

# Real model files. Keep model_dir as the folder containing arch/config/weights
# if your backend expects a single directory, or use model_config/model_weights
# separately if your backend expects explicit files.
model_dir: /home/dawn/models/rangenetpp
model_config: /home/dawn/models/rangenetpp/arch_cfg.yaml
model_weights: /home/dawn/models/rangenetpp/model
device: cuda

# Label space returned by the backend:
#   semantic_kitti          raw SemanticKITTI ids: road=40, building=50, ...
#   semantic_kitti_learning learning ids 0..19/20 from many RangeNet++ exports
#   internal                project labels: 0 unknown, 1 road, 2 sidewalk,
#                           3 building, 4 vegetation, 5 dynamic, 6 other
backend_label_space: semantic_kitti

# Label field published to /rangenet/semantic_points:
#   semantic_kitti is recommended, then launch semantic_slam with
#   lidar_label_mode:=semantic_kitti.
output_label_mode: semantic_kitti
confidence_default: 1.0

# Throughput controls. For Livox raw scans, keep stride 1 first;
# increase point_stride or lower max_points only if inference cannot keep up.
point_stride: 1
max_points: 120000
publish_every_n: 1
subscriber_queue_size: 1

# Range and intensity handling.
min_range_m: 0.3
max_range_m: 120.0
require_intensity: false
default_intensity: 0.0
intensity_field_candidates: [intensity, reflectivity]

# Extra keyword arguments passed directly into RangeNetPPBackend(...).
backend_extra_args: {}
