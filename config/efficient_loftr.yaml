# v9 default uses structure/pseudo images from C++ node instead of raw RGB satellite crop.
bev_topic: /local_bev/match_image
satellite_crop_topic: /satellite_map/match_image
meta_topic: /map_match/input_meta
output_topic: /map_match_pose_external
debug_topic: /map_match/efficient_loftr_debug

efficient_loftr_root: /home/dawn/software/EfficientLoFTR
weights_path: /home/dawn/software/EfficientLoFTR/weights/eloftr_outdoor.ckpt

# Safe default: RTX 5090 currently needs a compatible PyTorch CUDA build. Use CPU for pipeline tests.
device: cpu
match_rate: 0.005
min_seconds_between_matches: 180.0
max_image_dim: 384
torch_num_threads: 1
drop_if_busy: true
publish_debug_image: true

# Lower thresholds are for debugging. Raise to min_matches=30 and min_inliers=20 for final experiments.
min_matches: 10
min_inliers: 8
min_confidence: 0.20
min_inlier_ratio: 0.10
ransac_thresh_px: 5.0
max_rotation_deg: 25.0
min_scale: 0.70
max_scale: 1.30
match_noise_std: 1.5
use_opencv_fallback: false
