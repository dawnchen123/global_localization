# i2Nav AT128 semantic path:
#   /hesai/at128/points sensor_msgs/PointCloud2, raw LiDAR frame
#   -> RangeNet++ inference in the LiDAR frame
#   -> publish labeled points still in the raw LiDAR frame
#
# Do not feed /cloud_registered into RangeNet++ for normal segmentation: it is a
# world-frame FAST-LIVO2 cloud, not a raw range-image scan, and it degrades class
# separation between road/building/tree/vehicle.
input_cloud_topic: /hesai/at128/points
output_cloud_topic: /rangenet/semantic_points
odom_topic: /aft_mapped_to_init
map_frame: camera_init
input_cloud_in_map_frame: false
output_cloud_in_map_frame: false
# FAST-LIVO2 now publishes /aft_mapped_to_init and /cloud_registered with the
# LiDAR frame stamp. Preserve the raw LiDAR stamp so semantic fusion can match
# this labeled scan to the corresponding FAST-LIVO2 pose.
restamp_output_with_receipt_time: false

model_dir: /home/dawn/models/rangenetpp
backend: tensorrt
verbose: false

# AT128 raw clouds are denser than Livox. Increase point_stride or lower
# max_points only if TensorRT inference cannot keep up.
point_stride: 1
max_points: 180000
# TensorRT RangeNet++ is the expensive part of this pipeline. On this setup it
# can segfault when hammered by every LiDAR frame, so default to a conservative
# low-rate semantic stream. FAST-LIVO2 and voxel fusion keep running between
# semantic frames.
publish_every_n: 2
min_inference_interval_sec: 0.20
subscriber_queue_size: 1

min_range_m: 0.3
max_range_m: 220.0

# The bundled RangeNet++ model is trained on SemanticKITTI/Velodyne with about
# [-25, +3] degrees vertical FOV. AT128 is a spinning LiDAR closer to this
# domain, but it has higher upward beams; keep them and let geometry refinement
# stabilize high structures.
enable_pitch_filter: true
min_pitch_deg: -25.0
max_pitch_deg: 15.0
preserve_out_of_fov_points: true

require_intensity: false
default_intensity: 0.0
intensity_field_candidates: [intensity, reflectivity, remission]

# Hesai AT128 intensity is uint8-like [0,255], while the SemanticKITTI
# RangeNet++ model expects remission close to [0,1]. A wrong intensity scale
# strongly biases the network output.
intensity_scale: 255.0
clamp_intensity: true

# Domain-gap guard for AT128/SemanticKITTI. RangeNet++ still provides a prior, while
# simple ground/vertical geometry fixes common vegetation/road/building swaps.
enable_geometry_refinement: true
geometry_grid_resolution: 0.6
ground_height_threshold: 0.28
ground_reference_percentile: 0.12
ground_reference_max_above: 0.75
structure_min_height: 0.80
structure_min_vertical_span: 1.10
structure_min_points: 5
keep_dynamic_confidence: 0.80
geometry_confidence: 0.85
# From FAST-LIVO2/config/i2nav.yaml extrin_calib:
# p_body = R_LtoI * p_lidar + p_LinI.
T_body_lidar: [0.99993817, -0.00770257, -0.00802099, 0.042,
              -0.00771320, -0.99996941, -0.00129509, -0.018,
              -0.00801077,  0.00135687, -0.99996699, -0.063,
               0,           0,           0,           1]
