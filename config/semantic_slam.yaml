# Semantic SLAM pipeline parameters.
# Internal labels: 0 unknown, 1 road, 2 sidewalk/terrain, 3 building/structure,
# 4 vegetation/pole/sign, 5 dynamic object, 6 other object.

odom_topic: /aft_mapped_to_init  # FAST-LIVO2原始里程计输入；改成其他话题会改变语义建图/约束使用的位姿来源
map_frame: camera_init  # 语义地图发布坐标系；需与FAST-LIVO2地图坐标一致，改错会导致RViz错位

lidar_semantic_cloud_topic: /rangenet/semantic_points  # LiDAR语义点云输入；改成真实RangeNet++输出时同步检查label模式和坐标系
subscribe_lidar_semantic_cloud: true  # 是否订阅LiDAR语义点云；false会关闭主要语义地图来源
lidar_cloud_in_map_frame: false  # LiDAR语义点是否已在map frame；当前RangeNet++输出原始雷达系标签点，必须设false，由本节点统一转到camera_init
semantic_cloud_odom_match_mode: stamp  # 按LiDAR/odom原始时间戳匹配位姿；若FAST-LIVO2未开启publish/use_sensor_time才临时改receipt
max_semantic_odom_dt_sec: 0.20  # 语义点云与odom时间戳最大允许差(s)；调大=容忍时间偏差但易错位，调小=更严格但可能丢帧
pending_semantic_cloud_max_queue: 80  # stamp模式下等待对应odom的语义云最大缓存数；调大=抗推理/FAST-LIVO2延迟但占内存
pending_semantic_cloud_max_wait_sec: 20.0  # 语义云最多等待odom的墙钟时间(s)；调大=更少丢帧但旧帧堆积，调小=更实时
pending_semantic_cloud_max_process_per_cycle: 4  # 每轮最多融合缓存语义帧数；调大=追赶快但CPU尖峰大，调小=更平滑
lidar_label_mode: semantic_kitti  # LiDAR标签编码；真实RangeNet++用semantic_kitti，本包几何fallback才用internal
label_field: label  # PointCloud2里的标签字段名；字段不匹配会导致语义点云被跳过

subscribe_segformer_semantic_cloud: false  # 是否融合SAM3/SegFormer图像投影语义点云；true可补充实例/图像语义，但误分割会污染地图
segformer_semantic_cloud_topic: /segformer/projected_semantic_points  # 图像投影语义点云输入；SAM3融合时launch会覆盖为/sam3/projected_semantic_points
image_cloud_in_map_frame: true  # 图像投影点云是否已在map frame；当前SAM3吃/hesai原始点但输出camera_init点，设true；若投影节点输出雷达系则设false
image_label_mode: internal  # 图像语义标签编码；internal最稳，改错会导致类别颜色/约束类别错误

# FAST-LIVO2/config/i2nav.yaml extrin_calib/extrinsic_R,T for Hesai AT128.
# FAST-LIVO2 odom publishes body/IMU pose, while RangeNet++ consumes raw LiDAR-frame points, so map fusion uses:
# p_map = T_map_body * T_body_lidar * p_lidar.
T_body_lidar: [0.99993817, -0.00770257, -0.00802099, 0.042, -0.00771320, -0.99996941, -0.00129509, -0.018, -0.00801077, 0.00135687, -0.99996699, -0.063, 0, 0, 0, 1]  # body到LiDAR外参；改错会整体旋转/平移点云

voxel_size: 0.20  # 语义体素分辨率(m)；调大=更平滑/省内存但细节少，调小=细节多但噪声和内存增加
min_votes: 4.0  # 体素发布所需最小投票数；调大=更稳定但稀疏，调小=更密但误分类更多
min_confidence: 0.70  # 体素发布置信度阈值；调大=更干净但点少，调小=显示更多低置信点
confidence_vote_scale: 4.0  # 投票数转置信度的尺度；调大=需要更多观测才高置信，调小=少量观测也容易高置信
lidar_source_weight: 1.0  # LiDAR语义权重；调大=更相信LiDAR标签，调小=降低LiDAR对融合结果影响
image_source_weight: 0.65  # 图像语义权重；调大=更相信SAM3/SegFormer，调小=减少图像误分割污染
default_confidence: 0.75  # 输入点云无confidence字段时使用的默认置信度；调大=默认更信任，调小=默认更保守
fuse_dynamic_objects: false  # 是否融合动态物体；true会保留车/人等动态点，false更适合静态建图
enable_instance_dynamic_filter: true  # 是否启用轻量实例级动态过滤；true按局部聚类删除车/人/小物体，降低动态干扰
instance_cluster_resolution_m: 0.55  # 实例聚类BEV栅格(m)；调大=更容易合并成大实例，调小=分得更细但可能碎
instance_min_points: 8  # 非地面实例最小点数；调大=过滤更多孤立噪声，调小=保留稀疏远处物体
instance_dynamic_label_ratio: 0.15  # 实例内dynamic标签比例阈值；调低=更积极删动态，调高=更保守
instance_dynamic_min_height_m: 0.35  # 几何动态实例最小高度(m)；调大=少删低矮障碍，调小=更容易删路沿/低物体
instance_dynamic_max_height_m: 2.80  # 几何动态实例最大高度(m)；调大=可能删小树/广告牌，调小=只删车/人
instance_dynamic_max_length_m: 6.50  # 几何动态实例最大长度(m)；调大=会删大车/长物体，调小=更保守
instance_dynamic_max_width_m: 3.20  # 几何动态实例最大宽度(m)；调大=会删宽车辆，调小=更保守
publish_static_labeled_cloud: true  # 是否发布当前帧静态语义点云；true便于调试，false减少带宽/CPU

enable_semantic_z_correction: true  # 是否启用语义Z修正；true会用重访地面锚点拉齐往返高度，分割不稳时才关
enable_semantic_xy_correction: false  # 是否真正应用语义XY平移修正；true可能修回环，分割/匹配差时会拉坏轨迹
corrected_odom_topic: /semantic_corrected_odom  # 前端修正里程计输出；下游pose graph/评估可订阅该话题
corrected_path_topic: /semantic_corrected_path  # 当前修正量重算后的完整轨迹；比RViz Odometry历史缓存更适合判断收敛
corrected_path_max_poses: 12000  # corrected path保留最大位姿数；调大=轨迹更完整但消息更大，调小=更轻量
corrected_path_publish_rate: 2.0  # corrected path发布频率(Hz)；调大=刷新快但消息重，调小=更省CPU/带宽
z_constraint_topic: /semantic_slam/z_constraint  # Z/XY约束统计JSON输出；用于查看matches、MAD、拒绝原因等
z_anchor_resolution: 1.0  # 地面Z锚点网格分辨率(m)；调大=锚点更粗更稳但细节少，调小=局部更细但容易受噪声影响
object_anchor_resolution: 2.5  # 建筑/静态物体XY锚点网格分辨率(m)；调大=更粗鲁棒，调小=更精细但匹配更挑剔
enable_local_semantic_map_constraint: false  # 是否用多帧局部语义窗口建约束；分割稳定前先关，避免错误语义反馈到轨迹
local_semantic_lidar_only: true  # 局部约束是否只用LiDAR语义；true避免图像误分割污染，false会融合图像语义
local_semantic_window_sec: 6.0  # 局部语义窗口最短时间(s)；调大=约束更稳定但延迟大，调小=响应快但更抖
local_semantic_min_frames: 30  # 触发局部约束所需最小帧数；调大=更稳/更晚触发，调小=更容易触发/更噪
local_semantic_max_frames: 120  # 局部窗口最多保留帧数；调大=更多历史/更耗内存，调小=更轻量但约束少
local_semantic_max_points_per_frame: 1800  # 每帧用于约束的最大点数；调大=约束更密/更耗CPU，调小=更快但可能欠约束
min_z_constraint_matches: 160  # 接受Z约束的最小匹配数；调大=更保守，调小=更容易修正但误匹配风险高
min_ground_anchor_observations: 4  # 地面锚点最小观测次数；调大=锚点更可靠但建立慢，调小=建立快但噪声大
min_object_anchor_observations: 3  # 物体锚点最小观测次数；调大=XY约束更稳但少，调小=更多候选但误匹配多
max_z_constraint_samples: 3500  # 每次Z约束最多采样数；调大=统计更充分但CPU高，调小=更快但代表性下降
z_correction_alpha: 0.035  # Z语义残差更新比例；调大=修正更快但易震荡，调小=更稳但收敛慢
max_z_correction_step: 0.025  # 单次语义Z修正最大步长(m)；调大=快速拉回但易跳变，调小=平滑但慢
max_abs_z_correction: 4.00  # 语义Z累计修正上限(m)；调大=允许更大修正，调小=避免语义误差拉坏高度
max_z_residual_abs: 1.80  # 单个Z残差绝对值门限(m)；调大=允许1m级重访分层被拉回，调小=过滤离群/误匹配
max_z_residual_mad: 0.14  # Z残差MAD门限(m)；调大=更容易接受嘈杂约束，调小=只接受一致性好的约束
min_z_constraint_accept_streak: 5  # Z约束连续稳定接受次数；调大=更抗语义抖动但收敛慢，调小=响应快但易跳
max_z_residual_jump: 0.18  # 连续Z残差允许跳变量(m)；调大=容忍变化，调小=过滤不稳定匹配
z_correction_deadband: 0.04  # Z残差死区(m)；调大=小误差不修，调小=更敏感但可能抖
enable_ground_geometry_filter: true  # Z约束是否额外检查地面几何；true可阻止高处建筑误标为road后参与匹配
ground_filter_resolution_m: 0.8  # 地面几何过滤XY栅格(m)；调大=更平滑但可能跨边缘，调小=更局部但更稀疏
ground_filter_frame_percentile: 0.10  # 当前帧地面高度低分位；调大=更容易把坡面纳入，调小=更严格
ground_filter_min_cell_points: 5  # ground点邻域最少点数；调大=过滤孤立误分割点，调小=保留稀疏远处地面
ground_filter_neighbor_radius_cells: 1  # ground几何过滤使用的邻域半径(格)；调大=更稳但可能跨边缘，调小=更局部
max_ground_height_above_cell_min: 0.18  # ground点允许高于邻域最低点的最大高度(m)；调大=保留路沿/坡面，调小=过滤更强
max_ground_height_above_frame_ground: 0.45  # ground点允许高于当前帧低分位地面的最大高度(m)；调小可过滤高楼/树冠误匹配
ground_anchor_search_radius_cells: 1  # Z地面锚点搜索半径(格)；调大=容忍XY漂移，调小=更严格
max_ground_anchor_match_xy_m: 0.65  # Z锚点最大XY匹配距离(m)；调大=更容易匹配但可能跨车道，调小=更准但匹配少
min_ground_anchor_age_sec: 10.0  # 地面锚点最小年龄(s)；调大=只用重访区域，调小=更快触发但可能自约束
max_ground_anchor_update_z_residual: 0.22  # 成熟地面锚点更新残差门限(m)；调大=锚点更容易被新高度带跑，调小=保护旧锚点
min_semantic_z_correction_trust: 0.0  # 语义Z约束失效时保留的最小信任度；调大=旧修正更持久，调小=失效后衰减更彻底
max_z_constraint_stale_frames: 12  # Z约束失效多少轮后信任度降到最低；调大=衰减慢，调小=更快放弃旧语义修正
use_object_z_anchors: false  # 是否用建筑/物体做Z锚点；RangeNet++语义不稳时应关闭
enable_ground_robot_z_prior: true  # 是否启用地面车Z先验；true抑制不合理高度漂移，坡道/立交场景需谨慎
ground_robot_z_prior_alpha: 0.06  # 地面车Z先验更新比例；调大=更强压制Z漂移，调小=更温和
ground_robot_z_prior_max_step: 0.012  # 地面车Z先验单次最大修正(m)；调大=快速修正但可能跳，调小=更平滑
ground_robot_z_prior_deadband: 0.04  # Z先验死区(m)；调大=小漂移不修，调小=更敏感但可能抖
ground_robot_z_prior_max_grade: 0.008  # 允许路面坡度(dz/dxy)；调大=允许坡度/桥坡，调小=更强制平地
ground_robot_z_prior_vertical_margin: 0.008  # 每步允许的额外Z变化(m)；调大=更宽松，调小=更强抑制垂向抖动
ground_robot_z_prior_max_abs_correction: 8.0  # 地面车Z累计修正上限(m)；调大=可修大漂移，调小=避免过度改高度
ground_robot_z_prior_max_drift: 1.2  # 地面车参考高度允许漂移范围(m)；调大=允许长坡/起伏，调小=更像平地约束
use_keyframe_rebuilt_map: false  # 是否用关键帧重建地图；true会按当前Z修正重投影历史点，分割不稳时先关避免地图跳变
enable_ground_robot_roll_pitch_prior: true  # 是否压制roll/pitch；当前map-frame点云保持false，true可能改变姿态发布
ground_robot_roll_pitch_scale: 1.0  # roll/pitch保留比例；1=完全保留原姿态，0=只保留yaw，调小会强制更平
rebuilt_keyframe_min_distance: 1.0  # 重建地图关键帧最小间距(m)；调大=关键帧少/更轻，调小=更密/更耗内存
rebuilt_keyframe_min_interval_sec: 0.5  # 重建地图关键帧最小时间间隔(s)；调大=更稀疏，调小=更密集
rebuilt_keyframe_max_frames: 900  # 重建地图最多关键帧数；调大=地图更完整但内存高，调小=保留最近局部
rebuilt_keyframe_max_points_per_frame: 3000  # 每个重建关键帧最多点数；调大=细节多但CPU/内存高，调小=更快但稀疏
rebuilt_keyframe_lidar_only: true  # 重建关键帧是否只收LiDAR点；true更稳，false会把图像投影点也纳入
publish_constraint_debug: true  # 是否发布约束可视化；true可在RViz检查Z锚点匹配区域和是否ACCEPT
constraint_debug_raw_map_frame: true  # 约束debug是否显示在原始camera_init/map点云坐标；true便于检查是否贴地，false显示内部Z修正坐标
constraint_debug_max_pairs: 300  # 每次最多显示匹配对数量；调大=看更多细节但RViz负担高，调小=更清爽
z_constraint_debug_topic: /semantic_slam/z_constraint_debug  # Z约束MarkerArray话题；改名后RViz需重新添加
xy_constraint_debug_topic: /semantic_slam/xy_constraint_debug  # XY约束MarkerArray话题；用于看当前物体锚点匹配
z_constraint_points_topic: /semantic_slam/z_constraint_points  # Z约束匹配点云话题；蓝/黄点辅助检查误匹配区域
xy_constraint_points_topic: /semantic_slam/xy_constraint_points  # XY约束匹配点云话题；用于检查建筑/物体聚类是否稳定
enable_semantic_z_slope_correction: false  # 是否拟合Z斜面修正；分割/锚点不稳时先关，避免把局部误差放大成轨迹倾斜
min_z_slope_constraint_matches: 160  # Z斜面拟合最小样本数；调大=更保守，调小=更易触发但不稳
min_z_slope_spread_m: 12.0  # Z斜面样本空间跨度(m)；调大=只在大范围数据上拟合，调小=小区域也拟合
z_slope_correction_alpha: 0.06  # Z斜面更新比例；调大=斜面修正更快，调小=更稳
max_z_slope_correction_step: 0.0015  # 单次Z斜面变化上限；调大=快速改倾斜，调小=避免斜面跳变
max_abs_z_slope: 0.03  # Z斜面累计上限(dz/dxy)；调大=允许更大倾斜，调小=更接近平面
anchor_update_alpha: 0.006  # 历史锚点低通更新比例；调大=锚点快速跟随新观测，调小=更稳定但适应慢
object_anchor_weight: 0.0  # 物体Z锚点权重；调大=物体参与Z修正更多，0=禁用物体Z
use_vegetation_xy_anchors: false  # 是否用植被做XY锚点；true候选更多但树木易动/误分割，false更稳
min_xy_constraint_matches: 80  # 接受XY约束最小匹配数；调大=更保守，调小=更容易触发但风险高
max_xy_constraint_samples: 500  # XY约束最大采样数；调大=统计更充分但CPU高，调小=更快
xy_anchor_search_radius_cells: 1  # XY锚点邻域搜索半径(格)；调大=容忍漂移更大但误匹配增多，调小=更严格
xy_correction_alpha: 0.035  # XY修正比例；调大=修正快但可能拉偏，调小=更稳
max_xy_correction_step: 0.03  # 单次XY修正最大步长(m)；调大=快速修正，调小=平滑
max_abs_xy_correction: 3.0  # XY累计修正上限(m)；调大=允许大偏差修正，调小=保护原始轨迹
max_xy_match_residual: 1.5  # XY匹配最大残差(m)；调大=更多候选但误匹配多，调小=更严格
enable_semantic_yaw_correction: false  # 是否应用语义yaw修正；true可修航向，误匹配时会旋转整图
min_se2_constraint_matches: 80  # SE2求解最小匹配数；调大=更稳但少触发，调小=更易触发
min_se2_spread_m: 8.0  # SE2匹配点空间跨度(m)；调大=要求结构分布更广，调小=小区域也可求解但yaw不稳
max_se2_residual_rms: 0.8  # SE2拟合RMS门限(m)；调大=接受更粗匹配，调小=只接受精确匹配
yaw_correction_alpha: 0.03  # yaw修正比例；调大=航向改得快但易震荡，调小=更慢更稳
max_yaw_correction_step_deg: 0.10  # 单次yaw修正上限(deg)；调大=响应快，调小=避免突变
max_abs_yaw_correction_deg: 3.0  # yaw累计修正上限(deg)；调大=允许更大航向修正，调小=保护原始航向
pose_constraint_interval_sec: 1.0  # XY/SE2约束计算间隔(s)；调大=更省CPU/更慢，调小=更频繁
max_pose_constraint_stale_frames: 30  # XY/yaw约束失效多少轮后信任度降到最低；调大=旧修正保持久，调小=更快放弃
min_semantic_correction_trust: 0.05  # XY/yaw语义修正最小信任度；调大=失效后仍保留较多修正，调小=更快衰减

max_publish_points: 800000  # /semantic_cloud_map最多发布点数；调大=显示更完整但RViz/带宽压力大，调小=更流畅
max_voxels: 1800000  # 体素地图最大体素数；调大=地图容量大但内存高，调小=会更早裁剪旧体素
voxel_ttl_sec: 0.0  # 体素生存时间(s)；0=永久保留，调大为有限时间会删除旧点
publish_rate: 2.0  # 语义地图/BEV发布频率(Hz)；调大=刷新快但CPU/带宽高，调小=更省资源
min_range_m: 0.5  # 融合点最小距离(m)；调大=去掉近距离车体/噪声，调小=保留近处点
max_range_m: 220.0  # 融合点最大距离(m)；调大=保留远点但噪声多，调小=更干净但范围小
z_min_map: -5.0  # 发布/融合点最低Z(m)；调大=裁掉低处异常点，调小=保留地下/下坡点
z_max_map: 25.0  # 发布/融合点最高Z(m)；调大=保留高楼/树冠，调小=去掉高空噪声

semantic_cloud_topic: /semantic_cloud_map  # 全局语义点云输出；RViz主显示话题
semantic_cloud_stats_topic: /semantic_cloud_map/stats  # 语义地图统计JSON输出；用于监控点数、约束状态
static_labeled_cloud_topic: /semantic_cloud/static_labeled_points  # 当前帧静态语义点云输出；用于检查每帧分割质量

publish_bev: true  # 是否发布语义BEV图；true用于调试/后续匹配，false减少图像发布开销
bev_resolution: 0.25  # BEV分辨率(m/px)；调大=图更小更快但细节少，调小=细节多但更耗CPU/内存
bev_size_m: 180.0  # BEV覆盖边长(m)；调大=视野大但分辨率固定时图像更大，调小=局部更清晰
bev_center_on_latest_pose: true  # BEV是否以最新位姿为中心；true看局部窗口，false固定地图原点
bev_label_topic: /semantic_bev/label  # BEV标签图输出；mono8标签值0-6
bev_color_topic: /semantic_bev/color  # BEV彩色图输出；用于RViz/Image查看语义分布
bev_confidence_topic: /semantic_bev/confidence  # BEV置信度图输出；越亮表示越可信
bev_traversable_topic: /semantic_bev/traversable  # BEV可通行区域输出；道路/人行道为白色
