# External constrained-prior matching service configuration.
# This file is for reference when launching geo_prior_constraint_match_service.py
# outside ROS, or for copying into a shell script.

queue_dir: /tmp/eloftr_queue

# Optional SAM3-assisted road/building extraction. Run this service inside your
# mamba/conda SAM3 environment when these are enabled.
device: cuda
sam3_root: /home/dawn/software/sam3
sam3_checkpoint: ""
sam3_dtype: bf16
use_sam3_local: false
use_sam3_sat: false
sam3_local_mode: replace   # replace | merge
sam3_sat_mode: merge       # replace | merge
sam3_road_prompts: "road|street|paved road|drive lane|parking lot|sidewalk"
sam3_building_prompts: "building|roof|house|wall|structure"
sam3_score_thresh: 0.25
sam3_mask_thresh: 0.0
sam3_max_instances: 20
sam3_min_mask_area: 64
sam3_prior_gate_m: 6.0

# Optional georeferenced prior raster metadata. The YAML format follows
# satellite_mosaic.yml: image_path, center_lat, center_lon, meters_per_pixel.
# The mask paths below may be full georeferenced rasters aligned to prior_yaml,
# or already crop-aligned masks.
prior_yaml: ""
road_mask_path: ""
road_network_mask_path: ""
road_surface_mask_path: ""
building_mask_path: ""
traversable_mask_path: ""
vegetation_mask_path: ""
lane_mask_path: ""
road_network_buffer_m: 3.5
keep_vegetation_prior: false

# CSV columns: either east,north in the same ENU frame as the matcher, or lat,lon
# when prior_yaml contains an origin/center lat-lon.
entrance_csv_path: ""
mask_threshold: 127
entrance_radius_m: 2.0

# Candidate search around current EKF state.
search_radius_m: 35.0
search_step_m: 2.0
yaw_degs: "-10,-5,0,5,10"

# Acceptance gates before publishing a low-frequency absolute constraint.
min_score: 0.46
min_coverage: 0.20
target_coverage: 0.45
peak_delta_min: 0.020
peak_ratio_min: 1.020

# Local semantic BEV quality gates.
min_local_valid_pixels: 800
min_local_foreground_ratio: 0.008
min_local_confidence: 15
max_points: 12000
interior_sample_ratio: 0.02

# Distance-transform terms for soft constraints near buildings, roads and entrances.
dt_sigma_px: 6.0
dt_clip_px: 25.0
structure_distance_weight: 0.25
open_distance_weight: 0.08
entrance_weight: 0.15
road_edge_weight: 0.55
lane_line_weight: 0.65
prior_edge_dilate_iter: 1

output_variance: 9.0
poll_sec: 0.5
