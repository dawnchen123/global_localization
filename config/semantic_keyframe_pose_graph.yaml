# Keyframe-level semantic pose graph backend.
#
# This node is intentionally separate from semantic_voxel_mapper_node:
# - semantic_voxel_mapper_node remains the frontend/fusion visualizer;
# - this node builds semantic keyframes, loop/revisit constraints and optimized
#   odometry/map outputs.

# Feed the keyframe backend with the frontend Z-corrected odometry. The backend
# publishes guarded output: Z is corrected directly, XY/Yaw are only allowed
# through strict health gates.
odom_topic: /semantic_corrected_odom
semantic_cloud_topic: /semantic_cloud/static_labeled_points
cloud_in_map_frame: true
label_field: label
label_mode: internal
map_frame: camera_init

# Output policy:
#   z_only: publish FAST-LIVO2 XY/Yaw and only replace Z with semantic graph Z.
#   safe:   also outputs small XY/Yaw corrections only when graph health gates pass.
#   blend:  always blends XY/Yaw by output_xy_scale/output_yaw_scale.
#   full:   dangerous/debug only. It is downgraded to safe unless
#           allow_unsafe_full_output is true.
output_mode: safe
allow_unsafe_full_output: false

# preserve_roll_pitch keeps FAST-LIVO2 roll/pitch and only replaces the guarded yaw.
# yaw_only forces roll=pitch=0 and is only useful for pure 2D visualization/debug.
# raw keeps the original FAST-LIVO2 quaternion unchanged.
output_orientation_mode: preserve_roll_pitch

output_odom_topic: /semantic_graph_corrected_odom
path_topic: /semantic_pose_graph/path
map_topic: /semantic_pose_graph/map
stats_topic: /semantic_pose_graph/stats

keyframe_min_distance: 2.0
keyframe_min_yaw_deg: 8.0
keyframe_min_interval_sec: 0.5
max_keyframes: 2000
max_points_per_keyframe: 2600
min_point_range: 0.5
max_point_range: 160.0

enable_loop_constraints: true
enable_xy_loop_constraints: true
enable_z_loop_constraints: true
loop_min_index_gap: 35
loop_search_radius: 22.0
loop_max_candidates: 12
loop_min_inliers: 80
loop_min_ground_inliers: 35
loop_max_rms: 0.45
loop_min_spread: 6.0
loop_max_xy_correction: 2.0
loop_max_yaw_correction_deg: 3.0
loop_max_z_median: 0.8
loop_max_z_mad: 0.18
loop_min_building_inliers: 45
loop_min_spread_ratio: 0.35
loop_min_score_ratio: 1.45
loop_min_score_gap: 150.0
loop_max_xy_correction_for_xy: 0.8
loop_max_yaw_correction_for_xy_deg: 1.0
loop_max_xy_correction_for_z: 2.5
icp_grid_resolution: 0.8
icp_max_correspondence: 0.80
feature_min_cell_points: 3
ground_min_cell_points: 4
max_ground_cell_z_span: 0.35
ground_cell_local_z_min: -4.0
ground_cell_local_z_max: 1.2
icp_iterations: 5

# Coarse semantic BEV search before ICP. This is needed when the return pass is
# already several meters away from the earlier building/road observations.
# Keep it off by default. Local semantic similarity produced false large
# corrections in evaluation; large XY/Yaw recovery should come from global
# priors or from enabling the structural gates below deliberately.
enable_coarse_loop_search: false
coarse_xy_search_radius: 14.0
coarse_xy_search_step: 2.0
coarse_yaw_search_deg: 10.0
coarse_yaw_search_step_deg: 2.0
coarse_sample_points: 800
coarse_min_inliers: 18

odom_edge_weight: 1.0
loop_edge_weight: 0.45
loop_edge_min_weight: 0.20
loop_edge_max_weight: 2.00
loop_weight_inlier_reference: 150.0
loop_weight_rms_reference: 0.35
loop_weight_z_mad_reference: 0.12
loop_z_weight_scale: 1.00
loop_yaw_weight_scale: 1.00
loop_robust_kernel: 4.0
optimization_iterations: 20
optimization_gain: 0.20
max_opt_translation_step: 0.20
max_opt_z_step: 0.10
max_opt_yaw_step_deg: 0.20

# Final output guards. In z_only mode only output_z_* is used; the graph still
# runs internally and publishes diagnostics.
output_xy_scale: 0.05
output_yaw_scale: 0.05
output_z_scale: 1.0
max_output_xy_correction: 0.35
max_output_z_correction: 3.0
max_output_yaw_correction_deg: 0.25
min_loop_edges_for_xy_output: 10
max_output_opt_residual: 0.40

publish_optimized_map: true
publish_rate: 1.0
max_publish_map_points: 600000
