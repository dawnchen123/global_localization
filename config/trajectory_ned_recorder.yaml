# Save raw FAST-LIVO2 and fused odometry trajectories as:
#   t pos_n pos_e pos_d qx qy qz qw
# Fields are tab-separated and no header is written by default.

fast_livo_odom_topic: /aft_mapped_to_init
fused_odom_topic: /semantic_graph_corrected_odom

output_dir: /home/dawn/tmp/trajectory_records
fast_livo_filename: fast_livo2_local_ned.txt
fused_filename: fused_local_ned.txt

# enu_to_ned: ROS ENU/map convention -> local NED:
#   N = ros_y, E = ros_x, D = -ros_z, and quaternion is rotated into NED world axes.
# as_is: write odometry pose exactly as received.
coordinate_mode: enu_to_ned

# stamp: write ROS message stamp seconds.
# relative: subtract the first received odometry stamp shared by both streams.
time_mode: stamp
time_offset_sec: 0.0

# Match the requested example style:
# 109819.765  89.2924  -10.8692  3.5408  0.01843857 ...
time_precision: 3
position_precision: 4
quaternion_precision: 8

# 0 disables downsampling. Set e.g. 10.0 to save at no more than 10Hz per topic.
max_rate_hz: 0.0

# Flush every line by default so Ctrl-C or bag stop does not lose the tail.
flush_every_n: 1
write_header: false
append: false
