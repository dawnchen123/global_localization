# Convert livox_ros_driver/CustomMsg into sensor_msgs/PointCloud2 for RangeNet++.
#
# RangeNet++ should receive one raw LiDAR frame in the sensor frame. For the
# i2nav config this is /livox/mid360/points, which is Livox CustomMsg, so this
# converter publishes a standard PointCloud2 with x/y/z/intensity fields.

input_custom_topic: /livox/mid360/points
output_cloud_topic: /livox/mid360/points_xyzirt

# Increase if RangeNet++ cannot keep up. Keep 1 for best semantic quality.
point_stride: 1

min_range_m: 0.3
max_range_m: 120.0
drop_invalid: true
