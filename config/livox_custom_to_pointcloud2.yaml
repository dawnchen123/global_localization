# Legacy only: convert livox_ros_driver/CustomMsg into sensor_msgs/PointCloud2 for RangeNet++.
#
# RangeNet++ should receive one raw LiDAR frame in the sensor frame. For the
# current i2Nav AT128 setup this converter is not used; RangeNet++ subscribes
# directly to /hesai/at128/points. Keep this file only for old Mid-360 bags.

input_custom_topic: /livox/mid360/points
output_cloud_topic: /livox/mid360/points_xyzirt

# Increase if RangeNet++ cannot keep up. Keep 1 for best semantic quality.
point_stride: 1

min_range_m: 0.3
max_range_m: 120.0
drop_invalid: true
