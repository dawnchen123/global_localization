# Mid360 raw input adapter used by hybrid_localization_mid360.launch.
# It preserves line and offset_time so the standalone frontend can deskew scans.

input_custom_topic: /livox/mid360/points
output_cloud_topic: /livox/mid360/points_xyzirt

# Increase if RangeNet++ cannot keep up. Keep 1 for best semantic quality.
point_stride: 1

min_range_m: 0.3
max_range_m: 120.0
drop_invalid: true
