# FAST-LIVO2 output topics; adjust according to rostopic list.
fast_livo_odom_topic: /aft_mapped_to_init
fast_livo_cloud_topic: /cloud_registered
# gps_topic: /ublox/f9p/fix
# imu_topic: /adi/adis16465/imu
gps_topic: /ublox/f9p/fix
imu_topic: /adi/adis16465/imu



# Frames
earth_frame: earth
base_frame: base_link
publish_tf: false
init_yaw_from_imu: true

# cloud_registered is normally in FAST-LIVO2 camera_init/map frame.
cloud_frame_mode: livo_map

# Accumulate camera_init point clouds in a sliding window to enlarge the matching area.
cloud_accumulation_window: 40.0
cloud_accumulation_max_frames: 300
cloud_accumulation_stride: 1
cloud_accumulation_voxel_size: 0.10

# Multi-layer BEV generation from accumulated cloud. This is used for diagnosis
# and as a geometric structure layer; final matching should use the local
# semantic label map plus geographic-prior constraints.
bev_use_multilayer: true
bev_resolution: 0.25
bev_min_size_m: 120.0
bev_max_size_m: 260.0
bev_padding_m: 30.0
sat_crop_padding_m: 60.0
max_point_range: 160.0
z_min: -5.0
z_max: 8.0
ground_grid_size: 1.0
ground_remove_height: 0.05
bev_height_clip: 4.0
bev_density_weight: 0.30
bev_height_weight: 0.30
bev_obstacle_weight: 0.25
bev_ground_weight: 0.15
bev_dilate_iter: 2

# EKF noise
ekf_process_xy: 0.08
ekf_process_yaw: 0.02
gps_noise_std: 2.5
map_match_noise_std: 1.2
use_gps_update: true

# Matching backend:
#   external: C++ publishes structured local BEV/crop metadata; an external
#             constrained-prior service publishes /map_match_pose_external.
#   orb: legacy built-in ORB baseline on structure images only.
matcher_backend: external
external_match_pose_topic: /map_match_pose_external
match_rate: 0.10

# Gates applied by C++ EKF node to external or ORB measurements.
map_match_min_inliers: 20.0
map_match_min_confidence: 0.30
map_match_min_inlier_ratio: 0.15
map_match_max_correction: 30.0
map_match_max_gps_disagreement: 30.0
use_gps_consistency_gate: true
publish_rejected_match_debug: true

# Use the fixed map directory generated by satellite_tile_downloader.py.
satellite_yaml: /home/dawn/maps/fast_livo2_global_localization/satellite_mosaic.yml
