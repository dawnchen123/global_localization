# Local RangeNet++ compatibility fallback.
#
# This is NOT real RangeNet++. It is a lightweight C++ geometric label adapter
# used when RangeNet++ is not installed. It converts a normal PointCloud2 into
# the same topic shape expected from RangeNet++:
#
#   /rangenet/semantic_points
#     fields: x y z rgb label confidence
#
# Use this to verify the semantic voxel map/BEV pipeline. Replace it with a real
# RangeNet++ runtime later by disabling run_rangenet_adapter in semantic_slam.launch.

input_cloud_topic: /cloud_registered
output_cloud_topic: /rangenet/semantic_points

grid_resolution: 0.60
point_stride: 1
max_points: 250000
min_range_m: 0.5
max_range_m: 120.0
z_min: -5.0
z_max: 25.0

# Ground-relative geometric classification.
road_max_height_above_ground: 0.28
sidewalk_max_height_above_ground: 0.55
building_min_height_above_ground: 0.75
vegetation_min_height_above_ground: 0.40
structure_min_z_span: 1.00
flat_max_z_span: 0.35

# Intensity is optional and normally unavailable on /cloud_registered.
use_intensity_hint: false
intensity_vegetation_threshold: 0.0
drop_unknown: true
